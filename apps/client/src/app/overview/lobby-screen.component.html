<section class="lobby-card punk-card punk-card-lime halftone-overlay">
  <span class="tape-accent" aria-hidden="true"></span>
  <span class="graffiti-label" aria-hidden="true">Lobby</span>
  <header class="lobby-header">
    <h2>Lobby</h2>
    <div class="room-code">Raumcode: <strong>{{ roomState.id }}</strong></div>
  </header>

  <div class="lobby-grid">
    <article class="punk-card punk-card-cyan halftone-overlay">
      <h3>Einstellungen</h3>
      <label>
        Buchstaben
        <input
          class="punk-input"
          type="number"
          min="3"
          max="7"
          [(ngModel)]="settingsForm.wordLength"
          [disabled]="!isHost || isBusy"
        />
      </label>
      <label>
        Zeitlimit
        <select class="punk-input" [(ngModel)]="settingsForm.timeLimitSeconds" [disabled]="!isHost || isBusy">
          <option [ngValue]="0">Ohne Zeitlimit</option>
          <option [ngValue]="60">1 Minute</option>
          <option [ngValue]="120">2 Minuten</option>
          <option [ngValue]="180">3 Minuten</option>
          <option [ngValue]="240">4 Minuten</option>
          <option [ngValue]="300">5 Minuten</option>
        </select>
      </label>
      <label>
        Versuche
        <input
          class="punk-input"
          type="number"
          min="1"
          max="10"
          [(ngModel)]="settingsForm.maxGuesses"
          [disabled]="!isHost || isBusy"
        />
      </label>
      @if (isHost) {
        <div class="lobby-actions">
          <button class="punk-button" type="button" (click)="updateLobbySettings.emit()" [disabled]="isBusy">
            Einstellungen speichern
          </button>
          <button class="punk-button" type="button" (click)="startRound.emit()" [disabled]="isBusy">Runde starten</button>
        </div>
      } @else {
        <p class="hint">Nur der Host kann Einstellungen aendern und die Runde starten.</p>
      }
    </article>

    <article class="punk-card punk-card-magenta halftone-overlay">
      <h3>Spieler</h3>
      <ul class="player-list">
        @for (player of playerList; track player.id) {
          <li>
            <span>{{ player.name }}</span>
            <span class="status" [class.offline]="!player.connected">{{ player.connected ? 'online' : 'offline' }}</span>
          </li>
        }
      </ul>
    </article>
  </div>
</section>
