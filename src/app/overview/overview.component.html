<div class="container">
    <div class="topbar" role="toolbar" aria-label="Actions">
        <button type="button" class="new-game" (click)="onNewGame()">Neues Spiel</button>
    </div>
    <form #gameForm (submit)="onSubmit($event)" (keydown.enter)="onSubmit($event)" [style.padding-top.px]="topOffset">
        <div class="wordle-container" data-simplebar #lettersContainer [style.max-height.px]="wordleMaxHeight">
            <div class="letter-container" #letterRows>
                @for (row of rows; track $index; let rowIndex = $index) {
                <div class="letter-row" [class.row-enter]="row.enter" [class.row-error]="row.error" [class.row-shake]="row.shake">
                    @for (cell of row.cells; track $index; let cellIndex = $index) {
                    <input #letterInput type="text" class="letter" name="one" appSingleLetter
                        [value]="row.cells[cellIndex].letter"
                        [disabled]="row.locked"
                        [attr.tabindex]="row.locked ? -1 : 0"
                        [class.correct]="row.cells[cellIndex].state === 'correct'"
                        [class.present]="row.cells[cellIndex].state === 'present'"
                        [class.absent]="row.cells[cellIndex].state === 'absent'"
                        [class.unset]="row.cells[cellIndex].state === 'unset'" />
                    }
                </div>
                }
            </div>
        </div>
        <div class="status-row" role="status" aria-live="polite">
            <div class="word-error" [class.is-visible]="invalidWordVisible">
                {{ invalidWordMessage }}
            </div>
        </div>
        <app-keyboard #keyboardHost class="keyboard-container" [keyStates]="keyStates" (keyPressed)="onKeyboardKey($event)"></app-keyboard>
    </form>
    @if (showWinPopup) {
    <div class="overlay" role="dialog" aria-modal="true" aria-labelledby="win-title">
        <div class="popup">
            <h2 id="win-title">Herzlichen Glueckwunsch!</h2>
            <p class="score">Du hast das Wort in {{ winTries }} Zuegen erraten.</p>
            <p class="next-round">Bereit fuer die naechste Runde?</p>
            <div class="popup-actions">
                <button type="button" class="play-again" (click)="onPlayAgain()">Neue Runde starten</button>
                <button type="button" class="cancel" (click)="onCloseWinPopup()">Abbrechen</button>
            </div>
        </div>
    </div>
    }
</div>
